basePath: /api/v1
definitions:
  handler.CreateOpeningRequest:
    properties:
      company:
        example: Google
        type: string
      link:
        example: https://company.com/jobs/123
        type: string
      location:
        example: São Paulo - SP
        type: string
      remote:
        example: true
        type: boolean
      role:
        example: Senior Go Developer
        type: string
      salary:
        example: 12000
        type: integer
    type: object
  handler.CreateOpeningResponse:
    properties:
      data:
        $ref: '#/definitions/schemas.OpeningResponse'
      message:
        type: string
    type: object
  handler.ErrorResponse:
    properties:
      errorCode:
        type: integer
      message:
        type: string
    type: object
  schemas.OpeningResponse:
    properties:
      company:
        type: string
      createdAt:
        type: string
      deletedAt:
        type: string
      id:
        type: integer
      link:
        type: string
      location:
        type: string
      remote:
        type: boolean
      role:
        type: string
      salary:
        type: integer
      updatedAt:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: gabriel@email.com
    name: Gabriel Oliveira
    url: https://github.com/gaboliveiradev
  description: API para gerenciamento de vagas de emprego.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://api-jobs.com/terms
  title: API Jobs
  version: "1.0"
paths:
  /opening:
    post:
      consumes:
      - application/json
      description: Create a new job opening
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateOpeningRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CreateOpeningResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Create opening
      tags:
      - Openings
swagger: "2.0"
